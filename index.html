<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReplyAI - Professional Gmail AI Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h1>ReplyAI</h1>
            <p>Scale your email productivity with professional AI-generated replies.</p>
            
            <!-- Google OAuth Login Button -->
            <button id="loginBtn" class="btn-google">
                <img src="https://www.gstatic.com/images/branding/product/1x/gmail_32dp.png" alt="Gmail" width="20">
                <span>Sign in with Google</span>
            </button>

            <div style="margin-top: 24px; font-size: 12px; color: #94A3B8; text-align: left;">
                <strong>Requirements:</strong>
                <ul style="margin-top: 8px; padding-left: 16px;">
                    <li>Google Cloud Project with Gmail API enabled</li>
                    <li>OAuth 2.0 Client ID configured in <code>config.js</code></li>
                    <li>Scopes: <code>gmail.readonly</code>, <code>gmail.send</code></li>
                </ul>
            </div>
        </div>
    </div>

    <script type="module">
        import auth from './auth.js';
        
        document.getElementById('loginBtn').addEventListener('click', () => {
            auth.login();
        });

        // Check if already logged in
        if (auth.isLoggedIn()) {
            window.location.href = 'app.html';
        }
    </script>
</body>
</html>
